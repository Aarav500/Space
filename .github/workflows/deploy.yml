# ============================================================
# OrbitShield — CI/CD Pipeline
# Test → Build → Deploy to EC2 via SSM
#
# Reusable for all fullstack-template projects.
# To adapt: change image names, EC2 instance ID, S3 bucket.
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: commit SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  EC2_INSTANCE_ID: i-0a2969b26c6b89544
  S3_BUCKET: spaceinsurance
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/orbitshield-api
  WEB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/orbitshield-web

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Test
  # ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api-node/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api-node
        run: npm ci

      - name: Run API tests
        working-directory: apps/api-node
        env:
          NODE_ENV: test
        run: npx jest --runInBand --forceExit

  # ────────────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Images
  # ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "🏷️ Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api-node
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # Job 3: Deploy to EC2 via SSM
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM SendCommand
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy OrbitShield ${{ needs.build-push.outputs.tag }}" \
            --parameters commands='[
              "set -euo pipefail",
              "cd /var/www/app",
              "echo \"── Pulling latest images ──\"",
              "export TAG=${{ needs.build-push.outputs.tag }}",
              "export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}",
              "source .env",
              "docker compose pull",
              "echo \"── Starting services ──\"",
              "docker compose up -d --remove-orphans",
              "echo \"── Waiting for health check ──\"",
              "sleep 10",
              "curl -sf http://localhost/health || (echo \"❌ Health check failed\" && docker compose logs --tail=50 && exit 1)",
              "echo \"── Syncing to S3 ──\"",
              "aws s3 sync /var/www/app/data s3://${{ env.S3_BUCKET }} --region ${{ env.AWS_REGION }} || echo \"⚠️ S3 sync skipped (no data dir yet)\"",
              "echo \"── Pruning old images ──\"",
              "docker image prune -f",
              "echo \"✅ Deploy complete\""
            ]' \
            --timeout-seconds 300 \
            --output text \
            --query "Command.CommandId")

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "📡 SSM Command ID: ${COMMAND_ID}"

      - name: Wait for deployment to complete
        run: |
          echo "⏳ Waiting for SSM command to complete..."
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            || true

          # Get the result
          RESULT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)

          echo "📋 Command status: ${RESULT}"

          if [ "$RESULT" != "Success" ]; then
            echo "❌ Deployment failed!"
            aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

          echo "✅ Deployment succeeded!"

      - name: Post-deploy summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ needs.build-push.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **EC2** | \`${{ env.EC2_INSTANCE_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API Image** | \`${{ env.API_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web Image** | \`${{ env.WEB_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY

# ============================================================
# OrbitShield — CI/CD Pipeline
# Test → Setup EC2 + Build Images → Deploy via SSM
#
# Reusable for all fullstack-template projects.
# To adapt: change image names, EC2 instance ID, S3 bucket.
#
# IMPORTANT: All SSM commands use /bin/sh (not bash).
#   - No 'set -o pipefail', no 'source', no bash arrays
#   - Use 'set -eu', '. file', POSIX syntax only
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (default: commit SHA)"
        required: false
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  EC2_INSTANCE_ID: i-0a2969b26c6b89544
  S3_BUCKET: spaceinsurance
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/aarav500/orbitshield-api
  WEB_IMAGE: ghcr.io/aarav500/orbitshield-web

permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Test
  # ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api-node/package-lock.json
      - name: Install API dependencies
        working-directory: apps/api-node
        run: npm ci
      - name: Run API tests
        working-directory: apps/api-node
        run: NODE_ENV=test npx jest --runInBand --forceExit

  # ────────────────────────────────────────────────────────────
  # Job 2: Setup EC2 — install Docker, write .env, get configs
  # ────────────────────────────────────────────────────────────
  setup-ec2:
    name: Setup EC2
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Docker & dependencies on EC2
        id: setup
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Setup EC2 for OrbitShield" \
            --timeout-seconds 600 \
            --parameters commands='[
              "echo === OrbitShield EC2 Setup ===",
              "apt-get update -y",
              "DEBIAN_FRONTEND=noninteractive apt-get upgrade -y",
              "if ! command -v docker > /dev/null 2>&1; then apt-get install -y ca-certificates curl gnupg lsb-release && install -m 0755 -d /etc/apt/keyrings && curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg && chmod a+r /etc/apt/keyrings/docker.gpg && echo \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable\" | tee /etc/apt/sources.list.d/docker.list > /dev/null && apt-get update -y && apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin && usermod -aG docker ubuntu && echo Docker installed; else echo Docker already installed; fi",
              "if ! command -v aws > /dev/null 2>&1; then apt-get install -y unzip && curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip && unzip -qo /tmp/awscliv2.zip -d /tmp && /tmp/aws/install --update && rm -rf /tmp/aws /tmp/awscliv2.zip && echo AWS CLI installed; else echo AWS CLI already installed; fi",
              "mkdir -p /var/www/app/data",
              "chown -R ubuntu:ubuntu /var/www/app",
              "echo === EC2 setup complete ==="
            ]' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for EC2 setup
        run: |
          for i in $(seq 1 60); do
            RESULT=$(aws ssm get-command-invocation \
              --command-id "${{ steps.setup.outputs.command_id }}" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            if [ "$RESULT" = "Success" ]; then echo "EC2 setup done"; exit 0; fi
            if [ "$RESULT" = "Failed" ] || [ "$RESULT" = "TimedOut" ]; then
              echo "EC2 setup failed: ${RESULT}"
              aws ssm get-command-invocation --command-id "${{ steps.setup.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text 2>/dev/null || true
              aws ssm get-command-invocation --command-id "${{ steps.setup.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text 2>/dev/null || true
              exit 1
            fi
            echo "  ${RESULT} (${i}/60)"; sleep 10
          done
          exit 1

      - name: Write .env file to EC2
        id: envfile
        run: |
          # Build .env content locally (no shell escaping issues)
          ENV_CONTENT=$(cat <<'LOCALEOF'
          GHCR_OWNER=aarav500
          TAG=latest
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=1h
          CORS_ORIGIN=*
          SPACE_TRACK_USERNAME=${{ secrets.SPACE_TRACK_USERNAME }}
          SPACE_TRACK_PASSWORD=${{ secrets.SPACE_TRACK_PASSWORD }}
          NOAA_SWPC_BASE_URL=https://services.swpc.noaa.gov
          CELESTRAK_BASE_URL=https://celestrak.org
          AWS_REGION=us-east-1
          AWS_S3_BUCKET=spaceinsurance
          LOCALEOF
          )
          # Remove leading whitespace from heredoc indentation
          ENV_CONTENT=$(echo "$ENV_CONTENT" | sed 's/^          //')
          # Base64 encode to avoid any SSM JSON/shell quoting issues
          B64=$(echo "$ENV_CONTENT" | base64 -w 0)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Write .env to EC2" \
            --timeout-seconds 60 \
            --parameters commands="[\"echo $B64 | base64 -d > /var/www/app/.env\",\"chown ubuntu:ubuntu /var/www/app/.env\",\"chmod 600 /var/www/app/.env\",\"echo .env written with $(echo $ENV_CONTENT | grep -c =) variables\"]" \
            --output text \
            --query "Command.CommandId")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for .env write
        run: |
          for i in $(seq 1 20); do
            RESULT=$(aws ssm get-command-invocation \
              --command-id "${{ steps.envfile.outputs.command_id }}" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            if [ "$RESULT" = "Success" ]; then echo ".env written"; exit 0; fi
            if [ "$RESULT" = "Failed" ] || [ "$RESULT" = "TimedOut" ]; then
              echo ".env write failed"
              aws ssm get-command-invocation --command-id "${{ steps.envfile.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done
          exit 1

      - name: Download compose + nginx configs to EC2
        id: configs
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Download configs to EC2" \
            --timeout-seconds 60 \
            --parameters commands='[
              "curl -fsSL https://raw.githubusercontent.com/Aarav500/Space/main/docker-compose.yml -o /var/www/app/docker-compose.yml",
              "curl -fsSL https://raw.githubusercontent.com/Aarav500/Space/main/nginx.conf -o /var/www/app/nginx.conf",
              "chown ubuntu:ubuntu /var/www/app/docker-compose.yml /var/www/app/nginx.conf",
              "echo Configs downloaded"
            ]' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for config download
        run: |
          for i in $(seq 1 20); do
            RESULT=$(aws ssm get-command-invocation \
              --command-id "${{ steps.configs.outputs.command_id }}" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            if [ "$RESULT" = "Success" ]; then echo "Configs ready"; exit 0; fi
            if [ "$RESULT" = "Failed" ] || [ "$RESULT" = "TimedOut" ]; then
              echo "Config download failed"
              aws ssm get-command-invocation --command-id "${{ steps.configs.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done
          exit 1

  # ────────────────────────────────────────────────────────────
  # Job 3: Build & Push (runs parallel with setup-ec2)
  # ────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api-node
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Web image (no-cache to kill stale coverage)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.WEB_IMAGE }}:latest
          no-cache: true

  # ────────────────────────────────────────────────────────────
  # Job 4: Deploy (waits for both setup-ec2 and build-push)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [setup-ec2, build-push]
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy OrbitShield ${{ needs.build-push.outputs.tag }}" \
            --timeout-seconds 300 \
            --parameters commands='[
              "cd /var/www/app",
              "export TAG=${{ needs.build-push.outputs.tag }}",
              "export $(grep -v ^# /var/www/app/.env | xargs)",
              "echo Pulling images...",
              "docker compose pull",
              "echo Starting services...",
              "docker compose up -d --remove-orphans",
              "echo Waiting for health check...",
              "sleep 15",
              "curl -sf http://localhost/health || (echo Health check failed && docker compose logs --tail=80 && exit 1)",
              "echo Syncing to S3...",
              "aws s3 sync /var/www/app/data s3://spaceinsurance --region us-east-1 2>/dev/null || echo S3 sync skipped",
              "docker image prune -f",
              "echo Deploy complete"
            ]' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment
        run: |
          for i in $(seq 1 60); do
            RESULT=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ env.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            if [ "$RESULT" = "Success" ]; then
              echo "Deployment succeeded!"
              aws ssm get-command-invocation --command-id "${{ steps.ssm.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text 2>/dev/null || true
              exit 0
            elif [ "$RESULT" = "Failed" ] || [ "$RESULT" = "TimedOut" ] || [ "$RESULT" = "Cancelled" ]; then
              echo "Deployment failed: ${RESULT}"
              echo "=== STDOUT ==="
              aws ssm get-command-invocation --command-id "${{ steps.ssm.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text 2>/dev/null || true
              echo "=== STDERR ==="
              aws ssm get-command-invocation --command-id "${{ steps.ssm.outputs.command_id }}" --instance-id "${{ env.EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text 2>/dev/null || true
              exit 1
            fi
            echo "  ${RESULT} (${i}/60)"; sleep 10
          done
          exit 1

      - name: Post-deploy summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ needs.build-push.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 | \`${{ env.EC2_INSTANCE_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.API_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | \`${{ env.WEB_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # Job 5: Post-Deploy Diagnostics
  # Runs lightweight curl checks against the live site after deploy.
  # Fails the job if any critical check fails.
  # ────────────────────────────────────────────────────────────
  post-deploy-diagnostics:
    name: Post-Deploy Diagnostics
    runs-on: ubuntu-latest
    needs: [deploy, build-push]
    if: success()
    env:
      FRONTEND_URL: http://54.89.165.112
      API_URL: http://54.89.165.112/api
    steps:
      - name: API Health Check (with retries)
        id: health
        run: |
          echo "## API Health Check" >> $GITHUB_STEP_SUMMARY
          echo "Waiting for API to become healthy (up to 2 minutes)..."

          HTTP_CODE="000"
          LATENCY="timeout"
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 10 "${{ env.FRONTEND_URL }}/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              LATENCY=$(curl -sS -o /dev/null -w "%{time_total}" --max-time 10 "${{ env.FRONTEND_URL }}/health" 2>/dev/null || echo "timeout")
              echo "API healthy after ~$((i * 10))s"
              break
            fi
            echo "  Attempt ${i}/12: HTTP ${HTTP_CODE}, retrying in 10s..."
            sleep 10
          done

          echo "health_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "$HTTP_CODE" = "200" ]; then
            echo "| API Health | ✅ 200 (${LATENCY}s) |" >> $GITHUB_STEP_SUMMARY
            # Verify JSON structure
            if jq -e '.ok' /tmp/health.json > /dev/null 2>&1; then
              echo "| JSON Valid | ✅ ok=true |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| JSON Valid | ⚠️ Missing 'ok' key |" >> $GITHUB_STEP_SUMMARY
            fi
            # Check circuit breakers
            CB_CELESTRAK=$(jq -r '.circuitBreakers.celestrak // "unknown"' /tmp/health.json 2>/dev/null)
            CB_NOAA=$(jq -r '.circuitBreakers.noaa // "unknown"' /tmp/health.json 2>/dev/null)
            echo "| CelesTrak Breaker | ${CB_CELESTRAK} |" >> $GITHUB_STEP_SUMMARY
            echo "| NOAA Breaker | ${CB_NOAA} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| API Health | ❌ HTTP ${HTTP_CODE} (after 12 retries) |" >> $GITHUB_STEP_SUMMARY
            echo "::error::API health check failed with HTTP ${HTTP_CODE} after 2 minutes of retries"
          fi

      - name: Key Endpoint Checks
        id: endpoints
        run: |
          echo "## Endpoint Checks" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          FAIL=0

          # Space weather (may require auth → 401 is acceptable)
          SW_CODE=$(curl -sS -o /tmp/sw.json -w "%{http_code}" --max-time 15 "${{ env.API_URL }}/space-weather/current" 2>/dev/null || echo "000")
          if [ "$SW_CODE" = "200" ] || [ "$SW_CODE" = "401" ]; then
            echo "| /space-weather/current | ✅ ${SW_CODE} | Expected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| /space-weather/current | ❌ ${SW_CODE} | Unexpected |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          # Satellites (requires JWT → expect 401 with JSON body)
          SAT_CODE=$(curl -sS -o /tmp/sat.json -w "%{http_code}" --max-time 15 "${{ env.API_URL }}/satellites" 2>/dev/null || echo "000")
          if [ "$SAT_CODE" = "401" ]; then
            # Verify it returns JSON, not HTML
            if jq -e '.error' /tmp/sat.json > /dev/null 2>&1; then
              echo "| /satellites | ✅ 401 (JSON) | Auth gate working |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| /satellites | ⚠️ 401 (non-JSON) | Auth returns unexpected format |" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$SAT_CODE" = "200" ]; then
            echo "| /satellites | ✅ 200 | Endpoint accessible |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| /satellites | ❌ ${SAT_CODE} | Unexpected |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          # Dashboard overview
          DASH_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.API_URL }}/dashboard/overview" 2>/dev/null || echo "000")
          if [ "$DASH_CODE" = "200" ] || [ "$DASH_CODE" = "401" ]; then
            echo "| /dashboard/overview | ✅ ${DASH_CODE} | Expected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| /dashboard/overview | ❌ ${DASH_CODE} | Unexpected |" >> $GITHUB_STEP_SUMMARY
            FAIL=1
          fi

          echo "endpoints_fail=${FAIL}" >> "$GITHUB_OUTPUT"

      - name: CORS Preflight Check
        id: cors
        run: |
          echo "## CORS Preflight" >> $GITHUB_STEP_SUMMARY
          curl -sS -D /tmp/cors_headers.txt -o /dev/null \
            -X OPTIONS \
            -H "Origin: ${{ env.FRONTEND_URL }}" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: Content-Type, Authorization" \
            --max-time 15 \
            "${{ env.API_URL }}/satellites" 2>/dev/null || true

          echo "| Header | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          CORS_FAIL=0
          ACAO=$(grep -i "access-control-allow-origin" /tmp/cors_headers.txt 2>/dev/null | head -1 | tr -d '\r')
          ACAM=$(grep -i "access-control-allow-methods" /tmp/cors_headers.txt 2>/dev/null | head -1 | tr -d '\r')

          if [ -n "$ACAO" ]; then
            echo "| Allow-Origin | ✅ ${ACAO} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Allow-Origin | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
            CORS_FAIL=1
          fi

          if [ -n "$ACAM" ]; then
            echo "| Allow-Methods | ✅ ${ACAM} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Allow-Methods | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
            CORS_FAIL=1
          fi

          echo "cors_fail=${CORS_FAIL}" >> "$GITHUB_OUTPUT"

      # ── Auth + Satellite Tracking Smoke Test ─────────────────────
      # Logs in with dev user, then tests POST /satellites with token.
      - name: Auth Flow Smoke Test
        id: sat_smoke
        run: |
          echo "## Auth + Satellite Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          SAT_SMOKE_FAIL=0

          # Step 1: Login with dev user
          LOGIN_CODE=$(curl -sS -o /tmp/login.json -w "%{http_code}" \
            -X POST "${{ env.API_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"ash24@ucr.edu","password":"password"}' \
            --max-time 15 2>/dev/null || echo "000")

          TOKEN=$(jq -r '.token // empty' /tmp/login.json 2>/dev/null)

          if [ "$LOGIN_CODE" = "200" ] && [ -n "$TOKEN" ]; then
            echo "| Login | ✅ 200 (token received) |" >> $GITHUB_STEP_SUMMARY
          elif [ "$LOGIN_CODE" = "401" ]; then
            echo "| Login | ⚠️ 401 (user not seeded) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Login | ❌ ${LOGIN_CODE} |" >> $GITHUB_STEP_SUMMARY
            SAT_SMOKE_FAIL=1
          fi

          # Step 2: POST /satellites
          if [ -n "$TOKEN" ]; then
            SAT_CODE=$(curl -sS -o /tmp/sat_smoke.json -w "%{http_code}" \
              -X POST "${{ env.API_URL }}/satellites" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${TOKEN}" \
              -d '{"noradId":25544,"name":"ISS"}' \
              --max-time 15 2>/dev/null || echo "000")

            if echo "$SAT_CODE" | grep -qE "^(201|200|409)"; then
              echo "| POST /satellites | ✅ ${SAT_CODE} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| POST /satellites | ❌ ${SAT_CODE} |" >> $GITHUB_STEP_SUMMARY
              SAT_SMOKE_FAIL=1
            fi
          else
            UNAUTH=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X POST "${{ env.API_URL }}/satellites" \
              -H "Content-Type: application/json" \
              -d '{"noradId":25544,"name":"ISS"}' \
              --max-time 15 2>/dev/null || echo "000")
            if [ "$UNAUTH" = "401" ]; then
              echo "| POST /satellites | ✅ 401 (auth gate working) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| POST /satellites | ❌ ${UNAUTH} |" >> $GITHUB_STEP_SUMMARY
              SAT_SMOKE_FAIL=1
            fi
          fi

          echo "sat_smoke_fail=${SAT_SMOKE_FAIL}" >> "$GITHUB_OUTPUT"

      - name: Frontend Reachability
        id: frontend
        run: |
          echo "## Frontend Check" >> $GITHUB_STEP_SUMMARY
          FE_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.FRONTEND_URL }}" 2>/dev/null || echo "000")
          if [ "$FE_CODE" = "200" ]; then
            echo "✅ Frontend reachable (HTTP ${FE_CODE})" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend unreachable (HTTP ${FE_CODE})" >> $GITHUB_STEP_SUMMARY
            echo "::error::Frontend not reachable at ${{ env.FRONTEND_URL }}"
          fi
          echo "frontend_code=${FE_CODE}" >> "$GITHUB_OUTPUT"

      - name: Generate Diagnostics Report
        if: always()
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          REPORT="/tmp/diagnostics-${TIMESTAMP}.md"

          cat > "$REPORT" << 'EOF'
          # Post-Deploy Diagnostics Report
          EOF

          echo "**Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$REPORT"
          echo "**Tag:** ${{ needs.build-push.outputs.tag }}" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## Results" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Check | Status |" >> "$REPORT"
          echo "|-------|--------|" >> "$REPORT"

          # API Health
          if [ "${{ steps.health.outputs.health_code }}" = "200" ]; then
            echo "| API Health | ✅ |" >> "$REPORT"
          else
            echo "| API Health | ❌ HTTP ${{ steps.health.outputs.health_code }} |" >> "$REPORT"
          fi

          # Endpoints
          if [ "${{ steps.endpoints.outputs.endpoints_fail }}" = "0" ]; then
            echo "| Endpoints | ✅ |" >> "$REPORT"
          else
            echo "| Endpoints | ❌ |" >> "$REPORT"
          fi

          # CORS
          if [ "${{ steps.cors.outputs.cors_fail }}" = "0" ]; then
            echo "| CORS | ✅ |" >> "$REPORT"
          else
            echo "| CORS | ❌ |" >> "$REPORT"
          fi

          # Frontend
          if [ "${{ steps.frontend.outputs.frontend_code }}" = "200" ]; then
            echo "| Frontend | ✅ |" >> "$REPORT"
          else
            echo "| Frontend | ❌ HTTP ${{ steps.frontend.outputs.frontend_code }} |" >> "$REPORT"
          fi

          # Satellite Smoke Test
          if [ "${{ steps.sat_smoke.outputs.sat_smoke_fail }}" = "0" ]; then
            echo "| Sat Smoke Test | ✅ |" >> "$REPORT"
          else
            echo "| Sat Smoke Test | ❌ (possible localhost bug) |" >> "$REPORT"
          fi

          cat "$REPORT"
          echo "report_path=${REPORT}" >> "$GITHUB_OUTPUT"

      - name: Upload Diagnostics Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-diagnostics
          path: /tmp/diagnostics-*.md
          retention-days: 30

      - name: Fail if critical checks failed
        if: always()
        run: |
          FAILED=0

          if [ "${{ steps.health.outputs.health_code }}" != "200" ]; then
            echo "::error::API health check failed"
            FAILED=1
          fi

          if [ "${{ steps.endpoints.outputs.endpoints_fail }}" != "0" ]; then
            echo "::error::One or more endpoint checks failed"
            FAILED=1
          fi

          if [ "${{ steps.cors.outputs.cors_fail }}" != "0" ]; then
            echo "::warning::CORS preflight check failed — consider running /prod-auto-fix"
            # CORS failure is a warning, not a hard fail
          fi

          if [ "${{ steps.frontend.outputs.frontend_code }}" != "200" ]; then
            echo "::error::Frontend is not reachable"
            FAILED=1
          fi

          if [ "${{ steps.sat_smoke.outputs.sat_smoke_fail }}" != "0" ]; then
            echo "::error::Auth flow smoke test failed — check API connectivity and auth endpoints"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo "❌ Post-deploy diagnostics detected issues. See report artifact."
            exit 1
          else
            echo "✅ All post-deploy diagnostics passed."
          fi

# ============================================================
# OrbitShield — Production Docker Compose
# Reusable template for all fullstack-template projects
# ============================================================
# Usage:
#   TAG=latest docker compose up -d
#
# Required .env file on EC2 (see infra/ec2-init.sh):
#   DATABASE_URL, JWT_SECRET, SPACE_TRACK_USERNAME,
#   SPACE_TRACK_PASSWORD, NOAA_SWPC_BASE_URL, AWS_REGION,
#   AWS_S3_BUCKET, GHCR_OWNER
# ============================================================

services:
  # ── Express API ─────────────────────────────────────────────
  api:
    image: ghcr.io/${GHCR_OWNER:-aarav500}/orbitshield-api:${TAG:-latest}
    container_name: orbitshield-api
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1h}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-spaceinsurance}
      - CELESTRAK_BASE_URL=${CELESTRAK_BASE_URL:-https://celestrak.org}
      - SPACE_TRACK_USERNAME=${SPACE_TRACK_USERNAME}
      - SPACE_TRACK_PASSWORD=${SPACE_TRACK_PASSWORD}
      - NOAA_SWPC_BASE_URL=${NOAA_SWPC_BASE_URL:-https://services.swpc.noaa.gov}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_COVERAGE_PRICE_ID=${STRIPE_COVERAGE_PRICE_ID:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Next.js Frontend ───────────────────────────────────────
  web:
    image: ghcr.io/${GHCR_OWNER:-aarav500}/orbitshield-web:${TAG:-latest}
    container_name: orbitshield-web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: orbitshield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# Labs Config — App Registry
#
# This file is a lightweight registry of apps built from the fullstack-template.
# It is intended as READ-ONLY metadata for agents and humans — do NOT auto-edit
# without explicit human instruction.
#
# Schema per entry:
#   name            — kebab-case app identifier
#   repo_url        — GitHub (or other) repo URL
#   owner           — team or individual responsible
#   envs            — list of active environments
#   sla             — service level: experimental | basic | standard | critical
#   last_deploy     — ISO date of most recent production deploy (null if never deployed)
#   critical_paths  — list of user-critical flows requiring hardening
#   tags            — free-form labels for filtering and grouping

apps:
  - name: inventory-lab-app
    repo_url: https://github.com/<org>/inventory-lab-app   # placeholder
    owner: backend-team                                     # placeholder
    envs: [dev, staging, prod]
    sla: standard
    last_deploy: "2026-03-11"
    critical_paths: [checkout, inventory-sync]
    tags: [ecommerce, internal]

  - name: research-6g-prototype
    repo_url: https://github.com/<org>/research-6g-prototype  # placeholder
    owner: research-team                                       # placeholder
    envs: [dev]
    sla: experimental
    last_deploy: null
    critical_paths: []
    tags: [research, prototype]

